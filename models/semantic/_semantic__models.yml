version: 2


semantic_models:

  - name: journal_entries
    description: "GL journal entries at transaction grain"
    model: ref('fct_journal_entries')
    defaults:
      agg_time_dimension: posting_date

    entities:
      - name: journal_entry
        type: primary
        expr: journal_entry_id
      - name: account
        type: foreign
        expr: account_id
      - name: cost_center
        type: foreign
        expr: cost_center_id
      - name: legal_entity
        type: foreign
        expr: entity_id

    measures:
      - name: reporting_amount_total
        agg: sum
        expr: reporting_amount
        description: "Net GL amount in USD"
      - name: cogs_amount
        agg: sum
        expr: "CASE WHEN account_category = 'COGS' THEN reporting_amount ELSE 0 END"
      - name: opex_amount
        agg: sum
        expr: "CASE WHEN account_category = 'OPERATING EXPENSE' THEN reporting_amount ELSE 0 END"
      - name: da_amount
        agg: sum
        expr: "CASE WHEN account_name ILIKE '%depreciation%' OR account_name ILIKE '%amortization%' THEN reporting_amount ELSE 0 END"
      - name: net_income_amount
        agg: sum
        expr: "CASE WHEN financial_statement_line = 'Income Statement' THEN reporting_amount ELSE 0 END"
      - name: current_assets_amount
        agg: sum
        expr: "CASE WHEN account_category = 'CURRENT ASSETS' THEN net_amount ELSE 0 END"
      - name: current_liabilities_amount
        agg: sum
        expr: "CASE WHEN account_category = 'CURRENT LIABILITIES' THEN net_amount ELSE 0 END"
      - name: ar_amount
        agg: sum
        expr: "CASE WHEN account_number LIKE '1200%' THEN net_amount ELSE 0 END"
      - name: entry_count
        agg: count_distinct
        expr: journal_entry_id

    dimensions:
      - name: posting_date
        type: time
        type_params:
          time_granularity: day
        expr: posting_date
      - name: account_category
        type: categorical
        expr: account_category
      - name: account_name
        type: categorical
        expr: account_name
      - name: account_number
        type: categorical
        expr: account_number
      - name: financial_statement_line
        type: categorical
        expr: financial_statement_line
      - name: cost_center_name
        type: categorical
        expr: cost_center_name
      - name: department
        type: categorical
        expr: department
      - name: division
        type: categorical
        expr: division
      - name: business_unit
        type: categorical
        expr: business_unit
      - name: entity_name
        type: categorical
        expr: entity_name
      - name: entity_country
        type: categorical
        expr: entity_country
      - name: fiscal_year
        type: categorical
        expr: fiscal_year
      - name: fiscal_quarter
        type: categorical
        expr: fiscal_quarter
      - name: fiscal_period_name
        type: categorical
        expr: fiscal_period_name
      - name: journal_type
        type: categorical
        expr: journal_type
      - name: source_system
        type: categorical
        expr: source_system


  - name: invoices
    description: "Customer invoices — revenue recognition"
    model: ref('fct_invoices')
    defaults:
      agg_time_dimension: invoice_date

    entities:
      - name: invoice
        type: primary
        expr: invoice_id
      - name: legal_entity
        type: foreign
        expr: entity_id

    measures:
      - name: gross_invoice_total
        agg: sum
        expr: invoice_amount
      - name: discount_total
        agg: sum
        expr: discount_amount
      - name: return_total
        agg: sum
        expr: return_amount
      - name: net_revenue_amount
        agg: sum
        expr: net_amount_usd
      - name: invoice_count
        agg: count_distinct
        expr: invoice_id
      - name: customer_count
        agg: count_distinct
        expr: customer_id

    dimensions:
      - name: invoice_date
        type: time
        type_params:
          time_granularity: day
        expr: invoice_date
      - name: revenue_type
        type: categorical
        expr: revenue_type
      - name: customer_name
        type: categorical
        expr: customer_name
      - name: entity_name
        type: categorical
        expr: entity_name
      - name: fiscal_year
        type: categorical
        expr: fiscal_year
      - name: fiscal_quarter
        type: categorical
        expr: fiscal_quarter
      - name: fiscal_period_name
        type: categorical
        expr: fiscal_period_name
      - name: currency_code
        type: categorical
        expr: currency_code


  - name: budget
    description: "Budget and rolling forecast"
    model: ref('fct_budget')
    defaults:
      agg_time_dimension: budget_date

    entities:
      - name: budget_line
        type: primary
        expr: budget_line_id
      - name: account
        type: foreign
        expr: account_id
      - name: cost_center
        type: foreign
        expr: cost_center_id

    measures:
      - name: budget_amount_total
        agg: sum
        expr: budget_amount
      - name: forecast_amount_total
        agg: sum
        expr: forecast_amount

    dimensions:
      - name: budget_date
        type: time
        type_params:
          time_granularity: day
        expr: budget_date
      - name: budget_version
        type: categorical
        expr: budget_version
      - name: account_category
        type: categorical
        expr: account_category
      - name: account_name
        type: categorical
        expr: account_name
      - name: cost_center_name
        type: categorical
        expr: cost_center_name
      - name: division
        type: categorical
        expr: division
      - name: fiscal_year
        type: categorical
        expr: fiscal_year
      - name: fiscal_quarter
        type: categorical
        expr: fiscal_quarter
      - name: fiscal_period_name
        type: categorical
        expr: fiscal_period_name


metrics:

  # ---- Revenue ----
  - name: gross_revenue
    type: simple
    label: "Gross Revenue"
    description: "Total invoiced before discounts/returns"
    type_params:
      measure: gross_invoice_total

  - name: net_revenue
    type: simple
    label: "Net Revenue"
    description: "GAAP net revenue in USD"
    type_params:
      measure: net_revenue_amount

  - name: total_discounts
    type: simple
    label: "Discounts"
    type_params:
      measure: discount_total

  - name: total_returns
    type: simple
    label: "Returns"
    type_params:
      measure: return_total

  - name: invoice_count
    type: simple
    label: "Invoice Count"
    type_params:
      measure: invoice_count

  - name: active_customers
    type: simple
    label: "Active Customers"
    type_params:
      measure: customer_count

  - name: entry_count
    type: simple
    label: "Journal Entry Count"
    type_params:
      measure: entry_count

  # ---- P&L ----
  - name: cogs
    type: simple
    label: "COGS"
    type_params:
      measure: cogs_amount

  - name: gross_profit
    type: derived
    label: "Gross Profit"
    type_params:
      expr: rev - cogs
      metrics:
        - name: net_revenue
          alias: rev
        - name: cogs

  - name: gross_margin_pct
    type: derived
    label: "Gross Margin %"
    type_params:
      expr: "(rev - cogs) * 100.0 / NULLIF(rev, 0)"
      metrics:
        - name: net_revenue
          alias: rev
        - name: cogs

  - name: operating_expenses
    type: simple
    label: "Operating Expenses"
    type_params:
      measure: opex_amount

  - name: operating_income
    type: derived
    label: "Operating Income (EBIT)"
    type_params:
      expr: rev - cogs - opex
      metrics:
        - name: net_revenue
          alias: rev
        - name: cogs
        - name: operating_expenses
          alias: opex

  - name: depreciation_amortization
    type: simple
    label: "D&A"
    type_params:
      measure: da_amount

  - name: ebitda
    type: derived
    label: "EBITDA"
    type_params:
      expr: rev - cogs - opex + da
      metrics:
        - name: net_revenue
          alias: rev
        - name: cogs
        - name: operating_expenses
          alias: opex
        - name: depreciation_amortization
          alias: da

  - name: net_income
    type: simple
    label: "Net Income"
    type_params:
      measure: net_income_amount

  # ---- Variance ----
  - name: actual_gl
    type: simple
    label: "Actual (GL)"
    type_params:
      measure: reporting_amount_total

  - name: budget_total
    type: simple
    label: "Budget"
    type_params:
      measure: budget_amount_total

  - name: forecast_total
    type: simple
    label: "Forecast"
    type_params:
      measure: forecast_amount_total

  - name: budget_variance
    type: derived
    label: "Budget Variance"
    type_params:
      expr: actual - budget
      metrics:
        - name: actual_gl
          alias: actual
        - name: budget_total
          alias: budget

  - name: budget_variance_pct
    type: derived
    label: "Budget Variance %"
    type_params:
      expr: "(actual - budget) * 100.0 / NULLIF(budget, 0)"
      metrics:
        - name: actual_gl
          alias: actual
        - name: budget_total
          alias: budget

  # ---- Balance Sheet ----
  - name: current_assets
    type: simple
    label: "Current Assets"
    type_params:
      measure: current_assets_amount

  - name: current_liabilities
    type: simple
    label: "Current Liabilities"
    type_params:
      measure: current_liabilities_amount

  - name: working_capital
    type: derived
    label: "Working Capital"
    type_params:
      expr: ca - cl
      metrics:
        - name: current_assets
          alias: ca
        - name: current_liabilities
          alias: cl

  - name: accounts_receivable
    type: simple
    label: "Accounts Receivable"
    type_params:
      measure: ar_amount

  - name: dso
    type: derived
    label: "DSO"
    description: "Days Sales Outstanding"
    type_params:
      expr: "ar * 365.0 / NULLIF(rev, 0)"
      metrics:
        - name: accounts_receivable
          alias: ar
        - name: net_revenue
          alias: rev

  # ---- Cumulative ----
  - name: revenue_ytd
    type: cumulative
    label: "Revenue YTD"
    type_params:
      measure: net_revenue_amount
      cumulative_type_params:
        grain_to_date: year

  - name: revenue_qtd
    type: cumulative
    label: "Revenue QTD"
    type_params:
      measure: net_revenue_amount
      cumulative_type_params:
        grain_to_date: quarter


saved_queries:

  # ============================================================
  # CROSS-MODEL (metric_time only)
  # ============================================================

  - name: monthly_pnl
    description: "Monthly P&L for exec dashboard"
    query_params:
      metrics:
        - net_revenue
        - cogs
        - gross_profit
        - gross_margin_pct
        - operating_expenses
        - operating_income
        - depreciation_amortization
        - ebitda
        - net_income
      group_by:
        - TimeDimension('metric_time', 'month')
    exports:
      - name: pnl_monthly_export
        config:
          export_as: table
          schema: reporting_exports
          alias: monthly_pnl

  - name: quarterly_pnl
    description: "Quarterly P&L summary"
    query_params:
      metrics:
        - net_revenue
        - cogs
        - gross_profit
        - gross_margin_pct
        - operating_expenses
        - operating_income
        - ebitda
        - net_income
      group_by:
        - TimeDimension('metric_time', 'quarter')
    exports:
      - name: pnl_quarterly_export
        config:
          export_as: table
          schema: reporting_exports
          alias: quarterly_pnl

  - name: balance_sheet_metrics
    description: "Balance sheet and liquidity KPIs"
    query_params:
      metrics:
        - current_assets
        - current_liabilities
        - working_capital
        - accounts_receivable
        - dso
      group_by:
        - TimeDimension('metric_time', 'month')
    exports:
      - name: balance_sheet_export
        config:
          export_as: table
          schema: reporting_exports
          alias: balance_sheet

  # ============================================================
  # INVOICE MODEL (revenue queries)
  # ============================================================

  - name: revenue_analysis
    description: "Revenue by type and customer"
    query_params:
      metrics:
        - gross_revenue
        - net_revenue
        - total_discounts
        - total_returns
        - invoice_count
        - active_customers
      group_by:
        - TimeDimension('metric_time', 'month')
        - Dimension('invoice__revenue_type')
        - Dimension('invoice__customer_name')
        - Dimension('invoice__entity_name')
    exports:
      - name: revenue_analysis_export
        config:
          export_as: table
          schema: reporting_exports
          alias: revenue_analysis

  - name: revenue_by_quarter
    description: "Quarterly revenue by type"
    query_params:
      metrics:
        - net_revenue
        - gross_revenue
        - invoice_count
        - active_customers
      group_by:
        - Dimension('invoice__fiscal_year')
        - Dimension('invoice__fiscal_quarter')
        - Dimension('invoice__revenue_type')
    exports:
      - name: revenue_quarterly_export
        config:
          export_as: table
          schema: reporting_exports
          alias: revenue_by_quarter

  - name: revenue_by_entity
    description: "Revenue by legal entity and currency"
    query_params:
      metrics:
        - net_revenue
        - gross_revenue
        - total_discounts
        - invoice_count
      group_by:
        - TimeDimension('metric_time', 'month')
        - Dimension('invoice__entity_name')
        - Dimension('invoice__fiscal_year')
        - Dimension('invoice__fiscal_quarter')
        - Dimension('invoice__currency_code')
    exports:
      - name: revenue_entity_export
        config:
          export_as: table
          schema: reporting_exports
          alias: revenue_by_entity

  # ============================================================
  # JOURNAL ENTRIES MODEL (GL queries)
  # ============================================================

  - name: gl_by_department
    description: "GL actuals by department and account"
    query_params:
      metrics:
        - actual_gl
        - cogs
        - operating_expenses
        - depreciation_amortization
      group_by:
        - TimeDimension('metric_time', 'month')
        - Dimension('journal_entry__cost_center_name')
        - Dimension('journal_entry__division')
        - Dimension('journal_entry__account_category')
    exports:
      - name: gl_dept_export
        config:
          export_as: table
          schema: reporting_exports
          alias: gl_by_department

  - name: gl_by_entity
    description: "GL actuals by legal entity"
    query_params:
      metrics:
        - actual_gl
        - cogs
        - operating_expenses
        - depreciation_amortization
        - net_income
        - entry_count
      group_by:
        - TimeDimension('metric_time', 'month')
        - Dimension('journal_entry__entity_name')
        - Dimension('journal_entry__entity_country')
        - Dimension('journal_entry__fiscal_year')
        - Dimension('journal_entry__fiscal_quarter')
        - Dimension('journal_entry__fiscal_period_name')
        - Dimension('journal_entry__account_category')
    exports:
      - name: gl_entity_export
        config:
          export_as: table
          schema: reporting_exports
          alias: gl_by_entity

  - name: gl_by_account
    description: "GL actuals by account for P&L drill-through"
    query_params:
      metrics:
        - actual_gl
        - entry_count
      group_by:
        - TimeDimension('metric_time', 'month')
        - Dimension('journal_entry__account_category')
        - Dimension('journal_entry__account_name')
        - Dimension('journal_entry__account_number')
        - Dimension('journal_entry__financial_statement_line')
        - Dimension('journal_entry__fiscal_year')
        - Dimension('journal_entry__fiscal_period_name')
    exports:
      - name: gl_account_export
        config:
          export_as: table
          schema: reporting_exports
          alias: gl_by_account

  - name: gl_detail
    description: "Full GL detail for drill-through"
    query_params:
      metrics:
        - actual_gl
        - entry_count
      group_by:
        - TimeDimension('metric_time', 'month')
        - Dimension('journal_entry__fiscal_year')
        - Dimension('journal_entry__fiscal_quarter')
        - Dimension('journal_entry__fiscal_period_name')
        - Dimension('journal_entry__account_category')
        - Dimension('journal_entry__account_name')
        - Dimension('journal_entry__cost_center_name')
        - Dimension('journal_entry__division')
        - Dimension('journal_entry__business_unit')
        - Dimension('journal_entry__entity_name')
        - Dimension('journal_entry__entity_country')
        - Dimension('journal_entry__journal_type')
        - Dimension('journal_entry__source_system')
    exports:
      - name: gl_detail_export
        config:
          export_as: table
          schema: reporting_exports
          alias: gl_detail

  - name: opex_detail
    description: "Operating expenses by department and account"
    query_params:
      metrics:
        - operating_expenses
        - depreciation_amortization
      group_by:
        - TimeDimension('metric_time', 'month')
        - Dimension('journal_entry__cost_center_name')
        - Dimension('journal_entry__department')
        - Dimension('journal_entry__division')
        - Dimension('journal_entry__account_name')
        - Dimension('journal_entry__fiscal_year')
        - Dimension('journal_entry__fiscal_period_name')
    exports:
      - name: opex_detail_export
        config:
          export_as: table
          schema: reporting_exports
          alias: opex_detail

  - name: balance_sheet_by_entity
    description: "Balance sheet by legal entity"
    query_params:
      metrics:
        - current_assets
        - current_liabilities
        - working_capital
        - accounts_receivable
      group_by:
        - TimeDimension('metric_time', 'month')
        - Dimension('journal_entry__entity_name')
        - Dimension('journal_entry__entity_country')
        - Dimension('journal_entry__fiscal_year')
    exports:
      - name: bs_entity_export
        config:
          export_as: table
          schema: reporting_exports
          alias: balance_sheet_by_entity

  # ============================================================
  # BUDGET MODEL
  # ============================================================

  - name: budget_variance_report
    description: "Budget vs forecast by department"
    query_params:
      metrics:
        - budget_total
        - forecast_total
      group_by:
        - TimeDimension('metric_time', 'month')
        - Dimension('budget_line__cost_center_name')
        - Dimension('budget_line__division')
        - Dimension('budget_line__account_category')
    exports:
      - name: budget_export
        config:
          export_as: table
          schema: reporting_exports
          alias: budget_variance

  - name: budget_by_account
    description: "Budget by account and period"
    query_params:
      metrics:
        - budget_total
        - forecast_total
      group_by:
        - TimeDimension('metric_time', 'month')
        - Dimension('budget_line__account_category')
        - Dimension('budget_line__account_name')
        - Dimension('budget_line__cost_center_name')
        - Dimension('budget_line__fiscal_year')
        - Dimension('budget_line__fiscal_quarter')
        - Dimension('budget_line__fiscal_period_name')
        - Dimension('budget_line__budget_version')
    exports:
      - name: budget_account_export
        config:
          export_as: table
          schema: reporting_exports
          alias: budget_by_account